services:
  db:
    image: postgres:16-alpine
    container_name: rental-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental}
      POSTGRES_DB: ${POSTGRES_DB:-rental}
    ports:
      - '5432:5432'
    volumes:
      - rental_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rental} -d ${POSTGRES_DB:-rental}']
      interval: 5s
      timeout: 5s
      retries: 10

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: rental-libretranslate
    restart: unless-stopped
    environment:
      # Only download the language models we need (saves disk + boot time).
      LT_LOAD_ONLY: 'en,ar'
      # API served headless; no public web UI.
      LT_DISABLE_WEB_UI: 'true'
    ports:
      - '5000:5000'
    healthcheck:
      test:
        ['CMD-SHELL', "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      # Models download on first boot, which can take a while.
      start_period: 120s

volumes:
  rental_pgdata:
